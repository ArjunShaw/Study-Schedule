<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study OS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <header>
        <h1>Study Operating System</h1>
        <button id="themeToggle">🌙</button>
    </header>

    <section class="stats">
        <div class="card">XP: <span id="xp">0</span></div>
        <div class="card">Level: <span id="level">1</span></div>
        <div class="card">Streak: <span id="streak">0</span> 🔥</div>
        <div class="card">Today Hours: <span id="totalHours">0</span></div>
    </section>

    <section class="task-input">
        <input type="text" id="taskName" placeholder="Task name">
        <input type="number" id="taskHours" placeholder="Hours">
        <select id="taskPriority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
        <button onclick="addTask()">Add Task</button>
    </section>

    <ul id="taskList"></ul>

    <section class="charts">
        <canvas id="weeklyChart"></canvas>
        <canvas id="pieChart"></canvas>
    </section>

    <button onclick="exportCSV()">Export CSV</button>

</div>

<script src="script.js"></script>
</body>
</html>
